{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Zenvix{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<!-- HEADER -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="{% url 'home' %}">Zenvix</a>
    <div class="navbar-nav">
      <a class="nav-link" href="{% url 'home' %}">Головна</a>
      <a class="nav-link" href="{% url 'categories' %}">Категорії</a>
      {% for category in categories %}
        <a class="nav-link" href="{% url 'category' category.id %}">{{ category.name }}</a>
      {% endfor %}
    </div>
  </div>
</nav>

<!-- CONTENT -->
<div class="container mt-4 flex-grow-1">
    {% block content %}{% endblock %}
</div>

<!-- FOOTER -->
<footer class="bg-dark text-light text-center py-4 mt-auto">
    <h5>Zenvix</h5>
    <p>Кращий магазин цифрових товарів © 2026</p>
</footer>

</body>
</html>
