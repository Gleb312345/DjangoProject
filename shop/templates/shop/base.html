{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Zenvix{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<!-- HEADER -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="{% url 'home' %}">Zenvix</a>

    <div class="navbar-nav">
      <a class="nav-link" href="{% url 'home' %}">Головна</a>
      <a class="nav-link" href="{% url 'categories' %}">Категорії</a>

      {% for category in categories %}
        <a class="nav-link" href="{% url 'category' category.id %}">{{ category.name }}</a>
      {% endfor %}
    </div>

    <!-- 🛒 КОШИК -->
    <a href="{% url 'cart' %}" class="btn btn-outline-light ms-3">
      🛒 Кошик
    </a>

  </div>
</nav>

<!-- CONTENT -->
<div class="container mt-4 flex-grow-1">
    {% block content %}{% endblock %}
</div>

<!-- FOOTER -->
<footer class="bg-dark text-light text-center py-4 mt-auto">

    <h5>Zenvix</h5>
    <p>Кращий магазин цифрових товарів © 2026</p>

    <!-- 📩 ФОРМА РОЗСИЛКИ -->
    <form method="POST" action="{% url 'subscribe' %}" class="mt-3">
        {% csrf_token %}

        <input type="text" name="name" placeholder="Ваше ім’я" required class="mb-2 p-1">
        <input type="email" name="email" placeholder="Ваш email" required class="mb-2 p-1">

        <br>
        <button type="submit" class="btn btn-primary btn-sm">
            Підписатись
        </button>
    </form>

</footer>

</body>
</html>
