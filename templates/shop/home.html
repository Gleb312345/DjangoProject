<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Головна сторінка</title>
</head>

    <h1>Головна сторінка магазину</h1>

    <p>Оберіть сторінку:</p>

        {% endfor %}
    </ul>

</body>
</html>
